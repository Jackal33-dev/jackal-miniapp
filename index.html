     <p class="price">5g 50€</p>

</div>
<script>
function commander(produit, prix, quantite) {
  const message = `Commande Jackal:%0AProduit: ${produit}%0APrix: ${prix}€%0AQuantité: ${quantite} €%0ALocation ${adresse} `;
  
  const username = "leplug330bdx"; // ton pseudo sans @
  
  const url = `https://t.me/${username}?text=${message}`;

}
</script>
