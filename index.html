<!DOCTYPE html>
<html lang="fr">
<head>

</head>

</div>

<div class="product">

<button onclick="order('Produit 2')">Commander</button>
</div>

<div class="product">

<button onclick="order('Produit 3')">Commander</button>
</div>

</div>

</body>
</html>
